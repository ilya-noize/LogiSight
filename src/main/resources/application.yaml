spring:
  application:
    name: logisight
  datasource:
    url: jdbc:h2:mem:logisight
    username: sa
    password: password
    driverClassName: org.h2.Driver
  jpa:
#    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        show_sql: true
        format_sql: true
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  data:
    jdbc:
      dialect: h2
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false
jwt:
  token:
    key: "secret"
    time: 360